name: mithmoney
description: Track every rupee. Own your future.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^1.2.0

  # Animations
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  lottie: ^3.1.2

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Background Tasks
  workmanager: ^0.9.0

  # Permissions
  permission_handler: ^12.0.1

  # SMS Reading (Android only)
  flutter_sms_inbox: ^1.0.4

  # File operations
  path_provider: ^2.1.3
  share_plus: ^12.0.2
  file_picker: ^10.3.10

  # Image
  image_picker: ^1.1.2

  # Biometric Auth
  local_auth: ^3.0.1

  # Typography
  google_fonts: ^8.0.2

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2
  crypto: ^3.0.3

  # SVG
  flutter_svg: ^2.0.10+1

  # Spreadsheet operations
  csv: ^6.0.0
  excel: ^4.0.5

  # Sensors for parallax
  sensors_plus: ^7.0.0
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false
